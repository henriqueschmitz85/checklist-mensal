<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Checklist Online - São José/SC</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; background: #f4f4f4; }
        .item { background: white; padding: 10px; margin-bottom: 5px; display: flex; align-items: center; border-radius: 4px; }
        .item input[type="checkbox"] { margin-right: 10px; }
        .prazo { font-size: 0.8em; color: #666; margin-left: auto; }
        input[type="text"] { padding: 8px; width: 70%; margin-bottom: 10px; }
        button { padding: 8px; cursor: pointer; background: #28a745; color: white; border: none; }
    </style>
</head>
<body>

    <h2>📋 Minhas Atividades</h2>
    
    <input type="text" id="task" placeholder="Atividade (ex: NF Nilfisk)">
    <input type="text" id="deadline" placeholder="Prazo (ex: Dia 10)">
    <button onclick="addActivity()">Cadastrar</button>

    <div id="list"></div>

    <script>
        // Simulando banco de dados local (para teste imediato no VS Code)
        // Para ficar online real para outros, você conectará ao Firebase abaixo
        let activities = JSON.parse(localStorage.getItem('atividades')) || [];

        function render() {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = activities.map((a, i) => `
                <div class="item">
                    <input type="checkbox" ${a.done ? 'checked' : ''} onclick="toggle(${i})">
                    <span>${a.text}</span>
                    <span class="prazo">${a.deadline}</span>
                    <button style="background:red; padding: 2px 5px; margin-left:10px" onclick="remove(${i})">x</button>
                </div>
            `).join('');
            localStorage.setItem('atividades', JSON.stringify(activities));
        }

        function addActivity() {
            const text = document.getElementById('task').value;
            const deadline = document.getElementById('deadline').value;
            if(text) {
                activities.push({ text, deadline, done: false });
                render();
                document.getElementById('task').value = '';
                document.getElementById('deadline').value = '';
            }
        }

        function toggle(index) {
            activities[index].done = !activities[index].done;
            render();
        }

        function remove(index) {
            activities.splice(index, 1);
            render();
        }

        render();
    </script>
</body>
</html>
