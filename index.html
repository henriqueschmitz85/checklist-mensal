<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checklist</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

.item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

</style>

</head>

<body>

<div class="container">

<h2>Checklist mensal</h2>

<input id="task" placeholder="Tarefa">
<input id="day" type="number" placeholder="Dia">
<button onclick="addTask()">Adicionar</button>

<div id="list"></div>

</div>

<script>

// CONFIG FIREBASE (COLE AQUI A SUA)

const firebaseConfig = {
apiKey: "COLOQUE_AQUI",
authDomain: "COLOQUE_AQUI",
projectId: "COLOQUE_AQUI",
storageBucket: "COLOQUE_AQUI",
messagingSenderId: "COLOQUE_AQUI",
appId: "COLOQUE_AQUI"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function addTask(){

const task = document.getElementById("task").value
const day = document.getElementById("day").value

db.collection("tasks").add({
task:task,
day:day,
done:false
})

}

function loadTasks(){

db.collection("tasks").onSnapshot((snapshot)=>{

const list=document.getElementById("list")
list.innerHTML=""

snapshot.forEach((doc)=>{

const data=doc.data()

const div=document.createElement("div")
div.className="item"

div.innerHTML = `
<input type="checkbox">
${data.task} (dia ${data.day})
`

list.appendChild(div)

})

})

}

loadTasks()

</script>

</body>
</html>
