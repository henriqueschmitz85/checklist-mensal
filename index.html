<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Checklist Online - São José/SC</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item { background: #fff; padding: 10px; margin-bottom: 5px; display: flex; align-items: center; border-bottom: 1px solid #eee; }
        .item.done span { text-decoration: line-through; color: #888; }
        input[type="text"] { padding: 8px; width: 40%; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
        .prazo { font-size: 0.8em; color: #666; margin-left: auto; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📋 Atividades Mensais</h2>
        <input type="text" id="task" placeholder="Atividade">
        <input type="text" id="deadline" placeholder="Prazo">
        <button onclick="addActivity()">Salvar</button>
        <div id="list"></div>
    </div>

    <script>
        // Suas chaves do print {FBFF7342-8848-4782-9EAB-9D69DAF0DBDC}.png
        const firebaseConfig = {
            apiKey: "AIzaSyBBJUQ6XDrp6f_-oaEcZ_PTWVJDXvY1XCc",
            authDomain: "checklist-mensal.firebaseapp.com",
            projectId: "checklist-mensal",
            storageBucket: "checklist-mensal.firebasestorage.app",
            messagingSenderId: "260257157509",
            appId: "1:260257157509:web:a055cbc94eba3f27d1f4ec",
            databaseURL: "https://checklist-mensal-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('atividades');

        function addActivity() {
            const text = document.getElementById('task').value;
            const deadline = document.getElementById('deadline').value;
            if(text) {
                db.push({ text, deadline, done: false });
                document.getElementById('task').value = '';
                document.getElementById('deadline').value = '';
            }
        }

        db.on('value', (snapshot) => {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = '';
            snapshot.forEach((child) => {
                const a = child.val();
                const id = child.key;
                listDiv.innerHTML += `
                    <div class="item ${a.done ? 'done' : ''}">
                        <input type="checkbox" ${a.done ? 'checked' : ''} onclick="toggle('${id}', ${a.done})">
                        <span>${a.text}</span>
                        <span class="prazo">${a.deadline}</span>
                    </div>`;
            });
        });

        function toggle(id, currentStatus) {
            db.child(id).update({ done: !currentStatus });
        }
    </script>
</body>
</html>
