<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Empresa</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body style="font-family: sans-serif; background: #222; color: white; padding: 20px;">

    <div style="background: #333; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto;">
        <h2>📋 Checklist Online</h2>
        <input type="text" id="t" placeholder="Atividade" style="width: 100%; padding: 10px; margin-bottom: 10px;">
        <input type="text" id="p" placeholder="Prazo" style="width: 100%; padding: 10px; margin-bottom: 10px;">
        <button onclick="add()" style="width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer;">Salvar Atividade</button>
        
        <div id="lista" style="margin-top: 20px;"></div>
    </div>

    <script>
        // Configurações do seu print
        const config = {
            apiKey: "AIzaSyBBJUQ6XDrp6f_-oaEcZ_PTWVJDXvY1XCc",
            authDomain: "checklist-mensal.firebaseapp.com",
            databaseURL: "https://checklist-mensal-default-rtdb.firebaseio.com",
            projectId: "checklist-mensal",
            storageBucket: "checklist-mensal.firebasestorage.app",
            appId: "1:260257157509:web:a055cbc94eba3f27d1f4ec"
        };

        firebase.initializeApp(config);
        const db = firebase.database().ref('tarefas');

        function add() {
            const t = document.getElementById('t').value;
            const p = document.getElementById('p').value;
            if(t && p) {
                db.push({ tarefa: t, prazo: p, status: false });
                document.getElementById('t').value = '';
                document.getElementById('p').value = '';
            }
        }

        db.on('value', (s) => {
            const div = document.getElementById('lista');
            div.innerHTML = '';
            s.forEach((item) => {
                const d = item.val();
                div.innerHTML += `
                    <div style="background:#444; padding:10px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;">
                        <input type="checkbox" ${d.status ? 'checked' : ''} onclick="firebase.database().ref('tarefas/${item.key}').update({status: !${d.status}})">
                        <span style="${d.status ? 'text-decoration:line-through; color:gray' : ''}">${d.tarefa} (${d.prazo})</span>
                        <button onclick="firebase.database().ref('tarefas/${item.key}').remove()" style="background:red; color:white; border:none; padding:5px;">X</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
